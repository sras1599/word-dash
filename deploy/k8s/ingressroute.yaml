apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: word-dash
spec:
  stripPrefix:
    prefixes:
      - /api
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-realtime-prefix
  namespace: word-dash
spec:
  stripPrefix:
    prefixes:
      - /realtime
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: word-dash
  namespace: word-dash
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`word-dash.rasmalai.dev`) && PathPrefix(`/api`)
      kind: Rule
      middlewares:
        - name: strip-api-prefix
      services:
        - name: backend
          port: 8080
    - match: Host(`word-dash.rasmalai.dev`) && PathPrefix(`/realtime`)
      kind: Rule
      middlewares:
        - name: strip-realtime-prefix
      services:
        - name: backend
          port: 8081
    - match: Host(`word-dash.rasmalai.dev`)
      kind: Rule
      services:
        - name: frontend
          port: 80
