apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: word-dash
  namespace: flux-system
spec:
  interval: 1m
  path: ./deploy/k8s
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: word-dash-cloudflare
  namespace: flux-system
spec:
  interval: 1m
  path: ./deploy/cloudflare
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
  wait: true
