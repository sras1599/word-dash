name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/sras1599/word-dash/backend
  FRONTEND_IMAGE: ghcr.io/sras1599/word-dash/frontend

jobs:
  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test backend
        working-directory: backend
        run: go test ./...

  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_BASE_PATH: /
          VITE_API_URL: https://word-dash.rasmalai.dev/api
          VITE_WS_URL: wss://word-dash.rasmalai.dev/realtime
        run: npm run build

  release-please:
    name: Create or update release
    needs:
      - backend-checks
      - frontend-checks
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-frontend:
    name: Publish frontend image
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout released revision
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: frontend
          push: true
          build-args: |
            VITE_BASE_PATH=/
            VITE_API_URL=https://word-dash.rasmalai.dev/api
            VITE_WS_URL=wss://word-dash.rasmalai.dev/realtime
          tags: ${{ env.FRONTEND_IMAGE }}:${{ needs.release-please.outputs.tag_name }}

  publish-backend:
    name: Publish backend image
    needs:
      - release-please
      - publish-frontend
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout released revision
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push backend release marker
        uses: docker/build-push-action@v7
        with:
          context: backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ needs.release-please.outputs.tag_name }}
